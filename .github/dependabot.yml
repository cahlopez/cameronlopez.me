version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      # Bundle low-risk patch/minor bumps into a single PR to cut noise.
      minor-and-patch:
        update-types:
          - minor
          - patch
    commit-message:
      prefix: deps
      prefix-development: deps-dev

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
